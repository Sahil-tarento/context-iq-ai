
services:
  contextiq:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9009:9009"
      - "50051:50051"
    environment:
      - REST_PORT=9009
      - GRPC_PORT=50051
      - DATABASE_URL=postgres://postgres:postgres_password@postgres:5432/contextiq?sslmode=disable
      - REDIS_URL=redis:6379
      - QDRANT_URL=http://qdrant:6333
      - DEFAULT_PROVIDER=ollama
      - DEFAULT_MODEL=llama3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=contextiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
